<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Our List" />
  <meta name="theme-color" content="#faf8f4" />
  <title>Our List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf8f4; --surface: #ffffff; --ink: #1a1a18; --ink-light: #6b6860;
      --accent: #c8563a; --accent-soft: #f5ede9; --border: #e8e4de;
      --check: #4a9b6f; --check-soft: #e8f4ee; --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --tasks-accent: #5a7fbf; --tasks-accent-soft: #eef2fb;
    }
    html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
    body { display: flex; flex-direction: column; align-items: center; min-height: 100dvh; padding: env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0); }
    .app { width: 100%; max-width: 480px; padding: 40px 20px 100px; display: flex; flex-direction: column; gap: 28px; flex: 1; }

    /* Header */
    header { display: flex; flex-direction: column; gap: 4px; }
    .title { font-family: 'Lora', serif; font-size: 32px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.1; }
    .title em { font-style: italic; color: var(--accent); }
    .title em.tasks-color { color: var(--tasks-accent); }
    .subtitle { font-size: 13px; color: var(--ink-light); font-weight: 300; }
    .sync-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-light); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.3s; }
    .dot.live { background: var(--check); animation: pulse 2s infinite; }
    .dot.error { background: var(--accent); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Tab Toggle */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      gap: 4px;
      box-shadow: var(--shadow);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--ink-light);
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .tab-btn.active-list {
      background: var(--accent-soft);
      color: var(--accent);
      box-shadow: 0 1px 6px rgba(200,86,58,0.10);
    }
    .tab-btn.active-tasks {
      background: var(--tasks-accent-soft);
      color: var(--tasks-accent);
      box-shadow: 0 1px 6px rgba(90,127,191,0.10);
    }
    .tab-icon { font-size: 16px; line-height: 1; }

    /* Panels */
    .panel { display: none; flex-direction: column; gap: 20px; }
    .panel.visible { display: flex; }

    /* Input row */
    .input-row { display: flex; gap: 10px; align-items: center; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 10px 10px 16px; box-shadow: var(--shadow); transition: border-color 0.15s; }
    .input-row:focus-within { border-color: var(--accent); }
    .input-row.tasks-focus:focus-within { border-color: var(--tasks-accent); }
    .input-row input { flex: 1; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink); background: transparent; }
    .input-row input::placeholder { color: #b8b4ae; }
    .add-btn { background: var(--accent); color: white; border: none; border-radius: 9px; width: 38px; height: 38px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.12s, opacity 0.12s; -webkit-tap-highlight-color: transparent; }
    .add-btn.tasks-btn { background: var(--tasks-accent); }
    .add-btn:active { transform: scale(0.92); opacity: 0.85; }

    /* List / Task items */
    .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 8px; }
    .list { display: flex; flex-direction: column; gap: 8px; }
    .item { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 14px 14px 16px; box-shadow: var(--shadow); animation: slideIn 0.2s ease; transition: opacity 0.2s, border-color 0.2s, background 0.2s; }
    .item.done { background: var(--check-soft); border-color: #c5e2d0; opacity: 0.7; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .check-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; -webkit-tap-highlight-color: transparent; }
    .item.done .check-btn { background: var(--check); border-color: var(--check); }
    .check-icon { width: 12px; height: 12px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity 0.15s; }
    .item.done .check-icon { opacity: 1; }
    .item-name { flex: 1; font-size: 16px; transition: color 0.15s; }
    .item.done .item-name { text-decoration: line-through; color: var(--ink-light); }
    .del-btn { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; opacity: 0.35; transition: opacity 0.12s, background 0.12s; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
    .del-btn:hover, .del-btn:active { opacity: 1; background: #fde8e4; }
    .empty { text-align: center; padding: 40px 20px; color: var(--ink-light); font-size: 15px; font-family: 'Lora', serif; font-style: italic; }
    .empty span { display: block; font-size: 32px; margin-bottom: 10px; }
    .clear-btn { align-self: center; background: none; border: 1.5px solid var(--border); border-radius: 20px; padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink-light); cursor: pointer; transition: border-color 0.12s, color 0.12s, background 0.12s; -webkit-tap-highlight-color: transparent; }
    .clear-btn:hover, .clear-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .clear-btn.tasks-clear:hover, .clear-btn.tasks-clear:active { border-color: var(--tasks-accent); color: var(--tasks-accent); background: var(--tasks-accent-soft); }

    /* Setup banner */
    .setup-banner { background: #fff8e6; border: 1.5px solid #f0d080; border-radius: var(--radius); padding: 16px; font-size: 14px; line-height: 1.6; color: #5a4a00; }
    .setup-banner strong { display: block; margin-bottom: 4px; font-size: 15px; }
    .setup-banner code { background: #f0e8c0; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1 class="title" id="mainTitle">Our <em id="titleWord">List</em></h1>
    <div class="sync-status">
      <div class="dot" id="dot"></div>
      <span id="syncLabel">Connecting…</span>
    </div>
  </header>

  <div id="setupBanner" class="setup-banner" style="display:none">
    <strong>⚠️ Firebase not configured yet</strong>
    Open this file in a text editor and replace the Firebase config at the top of the &lt;script&gt; with your own.
  </div>

  <!-- Tab Toggle -->
  <div class="tab-bar">
    <button class="tab-btn active-list" id="tabList" onclick="switchTab('list')">
      <span class="tab-icon">🛒</span> Our List
    </button>
    <button class="tab-btn" id="tabTasks" onclick="switchTab('tasks')">
      <span class="tab-icon">✅</span> Our Tasks
    </button>
  </div>

  <!-- LIST PANEL -->
  <div class="panel visible" id="panelList">
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="Add something…" autocomplete="off" autocorrect="on" />
      <button class="add-btn" onclick="addItem()" aria-label="Add">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div>
      <p class="section-label" id="listLabel">Items</p>
      <div class="list" id="itemList"></div>
    </div>
    <button class="clear-btn" id="clearBtn" onclick="clearDone()" style="display:none">
      Remove checked items
    </button>
  </div>

  <!-- TASKS PANEL -->
  <div class="panel" id="panelTasks">
    <div class="input-row tasks-focus">
      <input type="text" id="taskInput" placeholder="Add a task…" autocomplete="off" autocorrect="on" />
      <button class="add-btn tasks-btn" onclick="addTask()" aria-label="Add task">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div>
      <p class="section-label" id="tasksLabel">Tasks</p>
      <div class="list" id="taskList"></div>
    </div>
    <button class="clear-btn tasks-clear" id="clearTasksBtn" onclick="clearDoneTasks()" style="display:none">
      Remove completed tasks
    </button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ─────────────────────────────────────────────
  // 🔧 PASTE YOUR FIREBASE CONFIG HERE
  // ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyC2cAsLe6J4HkUpq-PdkQVx-VzRQOf72Aw",
    authDomain: "our-list-10eb0.firebaseapp.com",
    databaseURL: "https://our-list-10eb0-default-rtdb.firebaseio.com",
    projectId: "our-list-10eb0",
    storageBucket: "our-list-10eb0.firebasestorage.app",
    messagingSenderId: "433098385607",
    appId: "1:433098385607:web:36edb73e43392e6bbdb6e2",
    measurementId: "G-0RC16P8SZF"
  };
  // ─────────────────────────────────────────────

  const isConfigured = !firebaseConfig.apiKey.includes("PASTE");

  if (!isConfigured) {
    document.getElementById('setupBanner').style.display = 'block';
    document.getElementById('syncLabel').textContent = 'Not connected';
    document.getElementById('dot').classList.add('error');
  } else {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const listRef = ref(db, 'shoppingList');
    const tasksRef = ref(db, 'ourTasks');

    // ── Shopping List ──
    onValue(listRef, (snapshot) => {
      const data = snapshot.val() || {};
      const items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
      items.sort((a, b) => (a.done - b.done) || (b.ts - a.ts));
      renderList(items);
      document.getElementById('dot').className = 'dot live';
      document.getElementById('syncLabel').textContent = 'Live';
    }, () => {
      document.getElementById('dot').className = 'dot error';
      document.getElementById('syncLabel').textContent = 'Connection error';
    });

    window.addItem = async function() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) return;
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
      await set(ref(db, 'shoppingList/' + id), { name, done: false, ts: Date.now() });
      input.value = '';
    };

    window.toggleItem = async function(id, currentDone) {
      await update(ref(db, 'shoppingList/' + id), { done: !currentDone });
    };

    window.removeItem = async function(id) {
      await remove(ref(db, 'shoppingList/' + id));
    };

    window.clearDone = async function() {
      onValue(listRef, async (snapshot) => {
        const data = snapshot.val() || {};
        for (const [id, val] of Object.entries(data)) {
          if (val.done) await remove(ref(db, 'shoppingList/' + id));
        }
      }, { onlyOnce: true });
    };

    // ── Our Tasks ──
    onValue(tasksRef, (snapshot) => {
      const data = snapshot.val() || {};
      const tasks = Object.entries(data).map(([id, val]) => ({ id, ...val }));
      tasks.sort((a, b) => (a.done - b.done) || (b.ts - a.ts));
      renderTasks(tasks);
    }, () => {
      document.getElementById('dot').className = 'dot error';
      document.getElementById('syncLabel').textContent = 'Connection error';
    });

    window.addTask = async function() {
      const input = document.getElementById('taskInput');
      const name = input.value.trim();
      if (!name) return;
      const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
      await set(ref(db, 'ourTasks/' + id), { name, done: false, ts: Date.now() });
      input.value = '';
    };

    window.toggleTask = async function(id, currentDone) {
      await update(ref(db, 'ourTasks/' + id), { done: !currentDone });
    };

    window.removeTask = async function(id) {
      await remove(ref(db, 'ourTasks/' + id));
    };

    window.clearDoneTasks = async function() {
      onValue(tasksRef, async (snapshot) => {
        const data = snapshot.val() || {};
        for (const [id, val] of Object.entries(data)) {
          if (val.done) await remove(ref(db, 'ourTasks/' + id));
        }
      }, { onlyOnce: true });
    };
  }

  // ── Helpers ──
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildItems(items, toggleFn, removeFn) {
    return items.map(item => {
      const el = document.createElement('div');
      el.className = 'item' + (item.done ? ' done' : '');
      el.innerHTML = `
        <button class="check-btn" onclick="${toggleFn}('${item.id}', ${item.done})">
          <svg class="check-icon" viewBox="0 0 12 10">
            <polyline points="1.5,5 4.5,8.5 10.5,1.5"/>
          </svg>
        </button>
        <span class="item-name">${escHtml(item.name)}</span>
        <button class="del-btn" onclick="${removeFn}('${item.id}')">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      `;
      return el;
    });
  }

  function renderList(items) {
    const list = document.getElementById('itemList');
    const clearBtn = document.getElementById('clearBtn');
    const label = document.getElementById('listLabel');
    const pending = items.filter(i => !i.done);
    const done = items.filter(i => i.done);

    label.textContent = pending.length === 0 && done.length > 0
      ? 'All done 🎉'
      : pending.length === 1 ? '1 item' : `${pending.length} items`;

    clearBtn.style.display = done.length > 0 ? 'block' : 'none';

    if (items.length === 0) {
      list.innerHTML = `<div class="empty"><span>🛒</span>Nothing here yet.<br>Add the first item!</div>`;
      return;
    }
    list.innerHTML = '';
    buildItems(items, 'toggleItem', 'removeItem').forEach(el => list.appendChild(el));
  }

  function renderTasks(tasks) {
    const list = document.getElementById('taskList');
    const clearBtn = document.getElementById('clearTasksBtn');
    const label = document.getElementById('tasksLabel');
    const pending = tasks.filter(i => !i.done);
    const done = tasks.filter(i => i.done);

    label.textContent = pending.length === 0 && done.length > 0
      ? 'All done 🎉'
      : pending.length === 1 ? '1 task' : `${pending.length} tasks`;

    clearBtn.style.display = done.length > 0 ? 'block' : 'none';

    if (tasks.length === 0) {
      list.innerHTML = `<div class="empty"><span>📋</span>No tasks yet.<br>Add the first one!</div>`;
      return;
    }
    list.innerHTML = '';
    buildItems(tasks, 'toggleTask', 'removeTask').forEach(el => list.appendChild(el));
  }

  // ── Keyboard ──
  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.addItem && window.addItem();
  });
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.addTask && window.addTask();
  });
</script>

<script>
  // Tab switching
  function switchTab(tab) {
    const panelList = document.getElementById('panelList');
    const panelTasks = document.getElementById('panelTasks');
    const tabList = document.getElementById('tabList');
    const tabTasks = document.getElementById('tabTasks');
    const titleWord = document.getElementById('titleWord');

    if (tab === 'list') {
      panelList.classList.add('visible');
      panelTasks.classList.remove('visible');
      tabList.className = 'tab-btn active-list';
      tabTasks.className = 'tab-btn';
      titleWord.textContent = 'List';
      titleWord.className = '';
    } else {
      panelTasks.classList.add('visible');
      panelList.classList.remove('visible');
      tabTasks.className = 'tab-btn active-tasks';
      tabList.className = 'tab-btn';
      titleWord.textContent = 'Tasks';
      titleWord.className = 'tasks-color';
    }
  }
</script>
</body>
</html>
