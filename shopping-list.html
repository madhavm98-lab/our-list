<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Our List" />
  <meta name="theme-color" content="#faf8f4" />
  <title>Our List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --ink: #1a1a18;
      --ink-light: #6b6860;
      --accent: #c8563a;
      --accent-soft: #f5ede9;
      --border: #e8e4de;
      --check: #4a9b6f;
      --check-soft: #e8f4ee;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    .app {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex: 1;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .title em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 13px;
      color: var(--ink-light);
      font-weight: 300;
    }

    /* Input area */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      box-shadow: var(--shadow);
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    .input-row input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--ink);
      background: transparent;
    }

    .input-row input::placeholder {
      color: #b8b4ae;
    }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 9px;
      width: 38px;
      height: 38px;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .add-btn:active { transform: scale(0.92); opacity: 0.85; }

    /* List */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 16px;
      box-shadow: var(--shadow);
      animation: slideIn 0.2s ease;
      transition: opacity 0.2s, border-color 0.2s, background 0.2s;
    }

    .item.done {
      background: var(--check-soft);
      border-color: #c5e2d0;
      opacity: 0.7;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .item.done .check-btn {
      background: var(--check);
      border-color: var(--check);
    }

    .check-icon {
      width: 12px;
      height: 12px;
      fill: none;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .item.done .check-icon { opacity: 1; }

    .item-name {
      flex: 1;
      font-size: 16px;
      font-weight: 400;
      transition: color 0.15s, text-decoration 0.15s;
    }

    .item.done .item-name {
      text-decoration: line-through;
      color: var(--ink-light);
    }

    .del-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      opacity: 0.35;
      transition: opacity 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .del-btn:hover, .del-btn:active { opacity: 1; background: #fde8e4; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-light);
      font-size: 15px;
      font-family: 'Lora', serif;
      font-style: italic;
    }

    .empty span { display: block; font-size: 32px; margin-bottom: 10px; }

    /* Clear done items button */
    .clear-btn {
      align-self: center;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--ink-light);
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .clear-btn:hover, .clear-btn:active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--check);
      display: inline-block;
      margin-left: 6px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1 class="title">Our <em>List</em> <span class="sync-dot" title="Synced"></span></h1>
    <p class="subtitle">Shared between the two of you</p>
  </header>

  <div class="input-row">
    <input type="text" id="itemInput" placeholder="Add something…" autocomplete="off" autocorrect="on" />
    <button class="add-btn" onclick="addItem()" aria-label="Add item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v12M2 8h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div>
    <p class="section-label" id="listLabel">To get</p>
    <div class="list" id="itemList"></div>
  </div>

  <button class="clear-btn" id="clearBtn" onclick="clearDone()" style="display:none">
    Remove checked items
  </button>
</div>

<script>
  const STORAGE_KEY = 'shopping-list-items';
  let items = [];

  async function load() {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      items = result ? JSON.parse(result.value) : [];
    } catch {
      items = [];
    }
    render();
  }

  async function save() {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(items), true);
    } catch(e) {
      console.error('Save failed', e);
    }
  }

  function render() {
    const list = document.getElementById('itemList');
    const clearBtn = document.getElementById('clearBtn');
    const label = document.getElementById('listLabel');
    const pending = items.filter(i => !i.done);
    const done = items.filter(i => i.done);

    label.textContent = pending.length === 0 && done.length > 0
      ? 'All done 🎉'
      : pending.length === 1 ? '1 item' : `${pending.length} items`;

    clearBtn.style.display = done.length > 0 ? 'block' : 'none';

    if (items.length === 0) {
      list.innerHTML = `<div class="empty"><span>🛒</span>Nothing here yet.<br>Add the first item!</div>`;
      return;
    }

    list.innerHTML = '';
    // Pending first, then done
    [...pending, ...done].forEach(item => {
      const el = document.createElement('div');
      el.className = 'item' + (item.done ? ' done' : '');
      el.innerHTML = `
        <button class="check-btn" onclick="toggle('${item.id}')" aria-label="Toggle">
          <svg class="check-icon" viewBox="0 0 12 10">
            <polyline points="1.5,5 4.5,8.5 10.5,1.5"/>
          </svg>
        </button>
        <span class="item-name">${escHtml(item.name)}</span>
        <button class="del-btn" onclick="remove('${item.id}')" aria-label="Delete">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      `;
      list.appendChild(el);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function addItem() {
    const input = document.getElementById('itemInput');
    const name = input.value.trim();
    if (!name) return;
    items.unshift({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), name, done: false });
    input.value = '';
    await save();
    render();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.done = !item.done; await save(); render(); }
  }

  async function remove(id) {
    items = items.filter(i => i.id !== id);
    await save();
    render();
  }

  async function clearDone() {
    items = items.filter(i => !i.done);
    await save();
    render();
  }

  // Enter key support
  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  // Poll for changes every 5 seconds (so partner's additions show up)
  setInterval(load, 5000);

  load();
</script>
</body>
</html>
